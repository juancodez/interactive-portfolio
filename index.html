<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Juan Gomez Vara</title>
<style>
* { box-sizing: border-box; }
html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#c9d4d8; font-family:"Trebuchet MS",Arial,sans-serif; }
#world { position:fixed; inset:0; }
#world canvas { display:block; width:100% !important; height:100% !important; }

#caption { position:fixed; top:16px; left:18px; z-index:5; color:rgba(34,45,54,.82); font-size:13px; letter-spacing:.08em; text-transform:uppercase; text-shadow:0 1px 0 rgba(255,255,255,.3); user-select:none; line-height:1.4; }
#caption strong { font-weight:800; letter-spacing:.12em; }

#hud { position:fixed; left:18px; bottom:16px; z-index:5; display:flex; gap:10px; align-items:center; color:#24313d; background:rgba(242,238,224,.68); border:1px solid rgba(42,57,69,.18); border-radius:8px; padding:8px 10px; box-shadow:0 10px 28px rgba(39,44,47,.15); backdrop-filter:blur(8px); user-select:none; }
.key { min-width:27px; height:24px; display:inline-flex; align-items:center; justify-content:center; border-radius:5px; background:rgba(255,255,255,.62); border:1px solid rgba(42,57,69,.2); font-size:12px; font-weight:700; }
.hint { font-size:12px; line-height:1; opacity:.82; }

#fade { position:fixed; inset:0; pointer-events:none; z-index:4; background: radial-gradient(circle at 50% 44%,rgba(255,255,255,0) 0 43%,rgba(46,57,64,.1) 77%,rgba(24,31,38,.2) 100%), linear-gradient(180deg,rgba(255,255,255,.08),rgba(46,57,64,.08)); }

/* house signs */
.house-sign { position:fixed; pointer-events:none; z-index:6; transform:translate(-50%,-50%); background:rgba(240,233,210,.96); border:1px solid rgba(42,57,69,.22); border-radius:4px; padding:3px 11px; font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:#1a2730; box-shadow:0 2px 8px rgba(0,0,0,.12); transition:opacity .2s; }

/* NPC UI */
.npc-ui { position:fixed; pointer-events:none; z-index:6; transform:translate(-50%,-100%); display:flex; flex-direction:column; align-items:center; gap:4px; transition:opacity .25s; }
.speech-bubble { animation:bub-bob 2.4s ease-in-out infinite; display:flex; flex-direction:column; align-items:center; }
.bubble-text { background:rgba(255,255,255,.97); border:1px solid rgba(42,57,69,.1); border-radius:10px; padding:5px 12px; font-size:11px; font-weight:700; color:#1a2730; white-space:nowrap; box-shadow:0 2px 12px rgba(0,0,0,.1); position:relative; }
.bubble-text::after { content:none; }
@keyframes bub-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.npc-name { background:rgba(242,238,224,.9); border:1px solid rgba(42,57,69,.18); border-radius:5px; padding:3px 10px; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#243240; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.1); }
.npc-dot { width:6px; height:6px; border-radius:50%; background:#c96a1c; box-shadow:0 0 6px rgba(201,106,28,.5); animation:dot-pulse 1.6s ease-in-out infinite; }
@keyframes dot-pulse { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.5);opacity:.55} }

/* interact hint */
#interact-hint { position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(10px); opacity:0; pointer-events:none; z-index:7; background:rgba(242,238,224,.96); border:1px solid rgba(42,57,69,.22); border-radius:8px; padding:8px 18px; font-size:13px; font-weight:600; color:#24313d; letter-spacing:.04em; box-shadow:0 6px 20px rgba(0,0,0,.12); backdrop-filter:blur(6px); transition:opacity .2s,transform .2s; white-space:nowrap; }
#interact-hint.visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* backdrop */
#backdrop { position:fixed; inset:0; background:rgba(6,15,32,0); pointer-events:none; z-index:19; transition:background .4s; }
#backdrop.active { background:rgba(6,15,32,.38); pointer-events:auto; }

/* panel */
#panel { position:fixed; right:0; top:0; bottom:0; width:420px; max-width:92vw; background:#ffffff; border-left:1px solid rgba(10,22,60,.09); box-shadow:-14px 0 48px rgba(6,15,32,.12); z-index:20; overflow-y:auto; padding:40px 28px 64px; transform:translateX(110%); transition:transform .4s cubic-bezier(.16,1,.3,1); font-family:'Satoshi',sans-serif; }
#panel.open { transform:translateX(0); }
#panel-close { position:absolute; top:20px; right:20px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(10,22,60,.05); border:1px solid rgba(10,22,60,.1); cursor:pointer; font-size:14px; color:#060810; transition:background .15s,border-color .15s; }
#panel-close:hover { background:rgba(10,22,60,.1); border-color:rgba(10,22,60,.2); }

/* panel typography */
.p-eyebrow { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#8090b0; margin-bottom:10px; }
.p-eyebrow-dot { width:6px; height:6px; border-radius:50%; background:#1d5fcc; flex-shrink:0; display:inline-block; }
.p-title { font-size:26px; font-weight:800; color:#060810; letter-spacing:-.03em; margin:0 0 6px; line-height:1.15; }
.p-title em { font-style:italic; color:#3d4f6e; font-weight:700; }
.p-sub { font-size:13px; color:#8090b0; margin:0 0 28px; font-weight:500; }

/* project cards with image */
.p-card { border:1px solid rgba(10,22,60,.09); border-radius:14px; overflow:hidden; margin-bottom:16px; cursor:pointer; transition:box-shadow .25s,transform .25s,border-color .25s; background:#f4f7ff; }
.p-card:hover:not(.p-card--soon) { box-shadow:0 8px 28px rgba(6,15,32,.1); transform:translateY(-2px); border-color:rgba(10,22,60,.18); }
.p-card-img-wrap { position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; }
.p-card-img { width:100%; height:100%; object-fit:cover; transition:transform .4s cubic-bezier(.16,1,.3,1); display:block; }
.p-card:hover:not(.p-card--soon) .p-card-img { transform:scale(1.04); }
.p-card-overlay { position:absolute; inset:0; background:rgba(6,15,32,.72); display:flex; flex-direction:column; justify-content:flex-end; padding:16px; opacity:0; transition:opacity .25s; }
.p-card:hover:not(.p-card--soon) .p-card-overlay { opacity:1; }
.p-overlay-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:4px; }
.p-overlay-desc { font-size:11.5px; color:rgba(255,255,255,.75); line-height:1.45; }
.p-card-body { padding:14px 16px 16px; }
.p-card-meta { font-size:10.5px; color:#8090b0; font-weight:600; letter-spacing:.03em; margin-bottom:8px; }
.p-card-title { font-size:16px; font-weight:700; color:#060810; margin:0 0 6px; letter-spacing:-.01em; }
.p-card-desc { font-size:12.5px; line-height:1.6; color:#3d4f6e; margin:0 0 12px; }
.p-btn { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#060810; border:1px solid rgba(6,8,16,.3); border-radius:100px; padding:7px 14px; text-decoration:none; transition:background .2s,border-color .2s; letter-spacing:.02em; font-family:'Satoshi',sans-serif; }
.p-btn:hover { background:rgba(6,8,16,.06); border-color:rgba(6,8,16,.6); }
.p-btn svg { flex-shrink:0; }
.p-full-link svg { transform:rotate(-45deg); flex-shrink:0; }
.p-card--soon { opacity:.65; cursor:default; }
.p-soon-badge { display:inline-block; font-size:10px; font-weight:700; color:#b07a1a; background:rgba(176,122,26,.1); border-radius:4px; padding:2px 8px; margin-bottom:6px; letter-spacing:.05em; text-transform:uppercase; }
.p-full-link { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#060f20 0%,#0f2552 50%,#1d5fcc 100%); color:#fff; border-radius:100px; padding:11px 22px; font-size:13px; font-weight:700; text-decoration:none; margin-top:16px; letter-spacing:.04em; transition:opacity .2s; }
.p-full-link:hover { opacity:.85; text-decoration:none; }

/* about panel */
.p-photo { width:100%; aspect-ratio:4/3; object-fit:cover; object-position:center top; border-radius:12px; margin-bottom:24px; display:block; }
.p-bio { font-size:13px; line-height:1.7; color:#3d4f6e; margin-bottom:12px; }
.p-bio strong { color:#060810; }
.p-tags { display:flex; flex-wrap:wrap; gap:7px; margin:16px 0 20px; }
.p-tag { background:#f4f7ff; border:1px solid rgba(10,22,60,.12); border-radius:100px; padding:5px 12px; font-size:11.5px; font-weight:600; color:#3d4f6e; }

/* contact panel */
.p-contact-link { display:flex; align-items:center; gap:13px; background:#f4f7ff; border:1px solid rgba(10,22,60,.09); border-radius:12px; padding:14px 16px; margin-bottom:10px; text-decoration:none; color:#060810; font-size:13px; font-weight:600; transition:box-shadow .2s,transform .2s,border-color .2s; }
.p-contact-link:hover { box-shadow:0 4px 16px rgba(6,15,32,.08); transform:translateY(-1px); border-color:rgba(10,22,60,.18); }
.p-contact-icon { width:36px; height:36px; border-radius:10px; background:rgba(10,22,60,.07); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.p-contact-sub { font-size:10px; color:#8090b0; font-weight:400; margin-top:1px; display:block; }
.p-divider { border:none; border-top:1px solid rgba(10,22,60,.08); margin:20px 0; }
.p-meta-row { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(10,22,60,.06); font-size:12px; }
.p-meta-key { color:#8090b0; font-weight:500; }
.p-meta-val { color:#060810; font-weight:700; }

/* big npc signs */
.sign-board-label { position:fixed; pointer-events:none; z-index:6; transform:translate(-50%,-50%); text-align:center; transition:opacity .2s; }
.sign-board-title { display:block; font-size:17px; font-weight:800; color:#2a1508; text-transform:uppercase; letter-spacing:.1em; line-height:1.15; text-shadow:0 1px 0 rgba(255,220,130,.35); }
.sign-board-tag { display:block; font-size:11px; font-weight:600; color:rgba(42,21,8,.6); letter-spacing:.06em; font-style:italic; margin-top:3px; }

/* tutorial hint bubble */
#tutorial-hint {
  position:fixed; bottom:96px; left:50%;
  transform:translateX(-50%) translateY(14px);
  z-index:8; pointer-events:none; user-select:none;
  background:rgba(255,255,255,.97);
  border:1.5px solid rgba(42,57,69,.14);
  border-radius:14px; padding:14px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,.14);
  backdrop-filter:blur(8px);
  opacity:0; transition:opacity .5s, transform .5s;
  text-align:center; min-width:240px;
}
#tutorial-hint.show { opacity:1; transform:translateX(-50%) translateY(0); }
#tutorial-hint::after {
  content:''; position:absolute; bottom:-9px; left:50%;
  transform:translateX(-50%);
  border-left:9px solid transparent; border-right:9px solid transparent;
  border-top:9px solid rgba(255,255,255,.97);
}
.th-head { font-size:11px; font-weight:800; color:#1a2730; letter-spacing:.06em; text-transform:uppercase; margin-bottom:9px; }
.th-body { font-size:12px; color:#3a4a56; line-height:2; font-weight:500; }
.th-body b { color:#1a2730; }

/* music toggle */
#music-btn {
  position:fixed; top:16px; right:18px; z-index:5;
  background:rgba(242,238,224,.68); border:1px solid rgba(42,57,69,.18);
  border-radius:8px; padding:6px 11px; font-size:16px; line-height:1;
  cursor:pointer; backdrop-filter:blur(8px);
  box-shadow:0 4px 12px rgba(39,44,47,.12);
  transition:background .15s; color:#243240;
}
#music-btn:hover { background:rgba(242,238,224,.92); }

@media (max-width:720px) { #caption{font-size:11px} #hud{left:10px;right:10px;bottom:10px;justify-content:center} .hint{display:none} #panel{width:100vw} }
</style>
</head>
<body>
<div id="world"></div>
<div id="caption"><strong>Portfolio</strong><br>Juan Gomez Vara</div>
<button id="music-btn" title="Toggle music">&#x1F50A;</button>
<div id="hud">
  <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
  <span class="hint">move</span>
  <span class="key">Space</span>
  <span class="hint">jump</span>
  <span class="key">drag</span>
  <span class="hint">orbit</span>
</div>
<div id="fade"></div>
<div id="interact-hint"></div>
<div id="tutorial-hint">
  <div class="th-head">&#x1F43C;&nbsp; Hi! Here's how to explore</div>
  <div class="th-body">
    &#x1F5B1; <b>Scroll</b> to zoom in &amp; out<br>
    &#x1F5B1; <b>Drag</b> to orbit the camera<br>
    &#x2B06; <b>WASD</b> / arrow keys to walk<br>
    &#x1F4AC; Walk up to characters &amp; press <b>E</b>
  </div>
</div>
<div id="backdrop"></div>
<div id="panel">
  <button id="panel-close" title="Close">&#x2715;</button>
  <div id="panel-body"></div>
</div>

<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
/* ── scene ── */
const root = document.getElementById("world");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc9d5d8);
scene.fog = new THREE.FogExp2(0xc9d5d8, 0.018);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
root.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 220);
const clock = new THREE.Clock();

/* ── lights ── */
const hemi = new THREE.HemisphereLight(0xe5f1ff, 0x9e8067, 1.35);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff4de, 2.8);
sun.position.set(-8, 14, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;  sun.shadow.camera.bottom = -30;
sun.shadow.camera.near = 1;  sun.shadow.camera.far = 45;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8fb0c8, 0.55);
fill.position.set(10, 8, -8);
scene.add(fill);

/* ── canvas textures ── */
function canvasTexture(draw, size) {
  size = size || 256;
  var c = document.createElement("canvas");
  c.width = c.height = size;
  var ctx = c.getContext("2d");
  draw(ctx, size);
  var t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

var furTex = canvasTexture(function(ctx, s) {
  ctx.fillStyle = "#c8ad83"; ctx.fillRect(0, 0, s, s);
  for (var i = 0; i < 2600; i++) {
    var x = Math.random()*s, y = Math.random()*s, len = 2+Math.random()*9, a = Math.random()*Math.PI;
    ctx.strokeStyle = Math.random() > 0.45 ? "rgba(89,62,38,.34)" : "rgba(239,220,179,.22)";
    ctx.lineWidth = Math.random() > 0.7 ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(a)*len, y+Math.sin(a)*len); ctx.stroke();
  }
});
furTex.repeat.set(2.2, 1.1);

var grassTex = canvasTexture(function(ctx, s) {
  ctx.fillStyle = "#79ad59"; ctx.fillRect(0, 0, s, s);
  for (var i = 0; i < 1800; i++) {
    var x = Math.random()*s, y = Math.random()*s;
    ctx.strokeStyle = Math.random() > 0.55 ? "rgba(34,91,42,.28)" : "rgba(205,226,154,.22)";
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.random()*5-2.5, y+2+Math.random()*7); ctx.stroke();
  }
});
grassTex.repeat.set(3, 3);

var stoneTex = canvasTexture(function(ctx, s) {
  ctx.fillStyle = "#dfddd7"; ctx.fillRect(0, 0, s, s);
  for (var i = 0; i < 900; i++) {
    var g = 190 + Math.random()*52;
    ctx.fillStyle = "rgba("+g+","+g+","+(g-6)+","+(0.08+Math.random()*0.16)+")";
    ctx.fillRect(Math.random()*s, Math.random()*s, 1+Math.random()*8, 1+Math.random()*8);
  }
});
stoneTex.repeat.set(2, 2);

/* ── materials ── */
var mat = {
  grass:      new THREE.MeshStandardMaterial({ map: grassTex, color: 0x7aa95a, roughness: 0.9,  flatShading: true }),
  grassDark:  new THREE.MeshStandardMaterial({ color: 0x4f843f, roughness: 0.94, flatShading: true }),
  dirt:       new THREE.MeshStandardMaterial({ color: 0x8a5c34, roughness: 0.96, flatShading: true }),
  stone:      new THREE.MeshStandardMaterial({ map: stoneTex, color: 0xe3e0d8, roughness: 0.96, flatShading: true }),
  stoneDark:  new THREE.MeshStandardMaterial({ color: 0xbbb9b0, roughness: 1.0,  flatShading: true }),
  dark:       new THREE.MeshStandardMaterial({ color: 0x12100f, roughness: 0.9,  flatShading: true }),
  blue:       new THREE.MeshStandardMaterial({ color: 0x2d869a, roughness: 0.65, metalness: 0.05 }),
  teal:       new THREE.MeshStandardMaterial({ color: 0x163c43, roughness: 0.75, metalness: 0.02 }),
  roof:       new THREE.MeshStandardMaterial({ color: 0xc08a44, roughness: 0.9,  flatShading: true }),
  roofLeaf:   new THREE.MeshStandardMaterial({ color: 0x6f9b45, roughness: 0.92, flatShading: true }),
  wall:       new THREE.MeshStandardMaterial({ color: 0xd7c2a0, roughness: 0.92, flatShading: true }),
  wallWarm:   new THREE.MeshStandardMaterial({ color: 0xcfac7e, roughness: 0.92, flatShading: true }),
  wood:       new THREE.MeshStandardMaterial({ color: 0x6d4429, roughness: 0.9,  flatShading: true }),
  lantern:    new THREE.MeshStandardMaterial({ color: 0xffd66d, roughness: 0.45, emissive: 0xffb23c, emissiveIntensity: 0.4 }),
  flowerRed:  new THREE.MeshStandardMaterial({ color: 0xd94f42, roughness: 0.72, flatShading: true }),
  flowerBlue: new THREE.MeshStandardMaterial({ color: 0x5b91c8, roughness: 0.72, flatShading: true }),
  sign:       new THREE.MeshStandardMaterial({ color: 0x7b5734, roughness: 0.86, flatShading: true }),
  white:      new THREE.MeshStandardMaterial({ color: 0xf0e9d7, roughness: 0.75, flatShading: true }),
  frogBody:   new THREE.MeshStandardMaterial({ color: 0x3d8b38, roughness: 0.78, flatShading: true }),
  frogBelly:  new THREE.MeshStandardMaterial({ color: 0xb5e082, roughness: 0.8,  flatShading: true }),
  foxOrange:  new THREE.MeshStandardMaterial({ color: 0xc96a1c, roughness: 0.82, flatShading: true }),
  foxCream:   new THREE.MeshStandardMaterial({ color: 0xf2d5a0, roughness: 0.78, flatShading: true }),
  foxDark:    new THREE.MeshStandardMaterial({ color: 0x2a1a0e, roughness: 0.9,  flatShading: true }),
  lionGold:   new THREE.MeshStandardMaterial({ color: 0xd4a330, roughness: 0.8,  flatShading: true }),
  lionMane:   new THREE.MeshStandardMaterial({ color: 0x7a4818, roughness: 0.9,  flatShading: true }),
  bunnyPink:  new THREE.MeshStandardMaterial({ color: 0xe8a0a0, roughness: 0.75, flatShading: true }),
};

/* ── helpers ── */
function mesh(geo, m, p, r, s) {
  var o = new THREE.Mesh(geo, m);
  if (p) o.position.set(p[0], p[1], p[2]);
  if (r) o.rotation.set(r[0], r[1], r[2]);
  if (s) o.scale.set(s[0], s[1], s[2]);
  o.castShadow = true; o.receiveShadow = true;
  scene.add(o); return o;
}
function addTo(parent, geo, m, p, r, s) {
  var o = new THREE.Mesh(geo, m);
  if (p) o.position.set(p[0], p[1], p[2]);
  if (r) o.rotation.set(r[0], r[1], r[2]);
  if (s) o.scale.set(s[0], s[1], s[2]);
  o.castShadow = true; o.receiveShadow = true;
  parent.add(o); return o;
}

/* ── colliders ── */
var worldColliders = [];
function registerCollider(x, z, hx, hz) { worldColliders.push({ x:x, z:z, hx:hx, hz:hz }); }
function resolveCollisions() {
  var r = 0.28;
  for (var i = 0; i < worldColliders.length; i++) {
    var c = worldColliders[i];
    var dx = player.position.x - c.x;
    var dz = player.position.z - c.z;
    var ox = c.hx + r - Math.abs(dx);
    var oz = c.hz + r - Math.abs(dz);
    if (ox <= 0 || oz <= 0) continue;
    if (ox < oz) player.position.x = c.x + (dx >= 0 ? 1 : -1) * (c.hx + r);
    else         player.position.z = c.z + (dz >= 0 ? 1 : -1) * (c.hz + r);
  }
}

/* ── island ── */
function makeIsland() {
  var g = new THREE.Group(); scene.add(g);
  var top = new THREE.Mesh(new THREE.BoxGeometry(20.8, 0.82, 14.6, 8, 1, 8), mat.grass);
  top.castShadow = true; top.receiveShadow = true; g.add(top);
  var sides = [[-10.25,-1.08,0,0.64,1.72,13.4],[10.18,-1.12,0.28,0.72,1.82,12.8],[0.1,-1.08,-7.1,18.4,1.68,0.7],[0.35,-1.05,7.08,18.8,1.75,0.72]];

/* ── wooden sign board texture (canvas-painted text on wood) ── */
function makeSignTexture(main, sub) {
  var W = 512, H = 256;
  var cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  var ctx = cv.getContext("2d");

  // 4 wood planks
  var plankHues = ["#c8903e","#d09842","#be8838","#ca9540"];
  for (var p = 0; p < 4; p++) {
    var py = p * 64;
    ctx.fillStyle = plankHues[p];
    ctx.fillRect(0, py, W, 64);
    var pg = ctx.createLinearGradient(0, py, 0, py + 64);
    pg.addColorStop(0, "rgba(255,200,100,.20)");
    pg.addColorStop(0.45,"rgba(255,200,100,.08)");
    pg.addColorStop(1,   "rgba(0,0,0,.14)");
    ctx.fillStyle = pg; ctx.fillRect(0, py, W, 64);
  }
  // wood grain lines (deterministic sine)
  for (var i = 0; i < 16; i++) {
    var gx = 18 + i * 31;
    ctx.strokeStyle = (i % 2 === 0) ? "rgba(70,30,0,.12)" : "rgba(90,40,0,.09)";
    ctx.lineWidth = 0.9 + (i % 3) * 0.4;
    ctx.beginPath(); ctx.moveTo(gx, 0);
    for (var gy = 0; gy <= H; gy += 3) ctx.lineTo(gx + Math.sin(gy * 0.035 + i * 0.8) * 7, gy);
    ctx.stroke();
  }
  // plank dividers
  ctx.strokeStyle = "rgba(55,22,0,.52)"; ctx.lineWidth = 4;
  for (var pd = 1; pd < 4; pd++) { ctx.beginPath(); ctx.moveTo(0,pd*64); ctx.lineTo(W,pd*64); ctx.stroke(); }

  // outer border
  ctx.strokeStyle = "rgba(45,18,0,.78)"; ctx.lineWidth = 12;
  ctx.strokeRect(5, 5, W-10, H-10);
  ctx.strokeStyle = "rgba(190,120,35,.45)"; ctx.lineWidth = 2;
  ctx.strokeRect(15, 15, W-30, H-30);

  // corner rivets
  var corners = [[28,28],[W-28,28],[28,H-28],[W-28,H-28]];
  for (var ci = 0; ci < corners.length; ci++) {
    var cx = corners[ci][0], cy = corners[ci][1];
    ctx.fillStyle = "rgba(40,15,0,.72)";
    ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.fill();
    var rg = ctx.createRadialGradient(cx-2,cy-2,1,cx,cy,8);
    rg.addColorStop(0,"#e8c060"); rg.addColorStop(1,"#7a4408");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fill();
  }

  // dark overlay band — boosts text contrast on the wood texture
  ctx.fillStyle = "rgba(0,0,0,.38)";
  ctx.fillRect(12, H*0.08, W-24, H*0.86);

  // main text (section name)
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 92px 'Trebuchet MS', Impact, Arial, sans-serif";
  // warm highlight (emboss)
  ctx.fillStyle = "rgba(255,230,140,.70)";
  ctx.fillText(main.toUpperCase(), W/2-2, H*0.40-2);
  // pure white — maximum contrast on darkened overlay
  ctx.fillStyle = "#ffffff";
  ctx.fillText(main.toUpperCase(), W/2, H*0.40);

  // sub text (tagline)
  ctx.font = "600 40px 'Trebuchet MS', Arial, sans-serif";
  // warm highlight
  ctx.fillStyle = "rgba(255,225,130,.60)";
  ctx.fillText(sub, W/2-1.5, H*0.78-1.5);
  // cream fill
  ctx.fillStyle = "#f5e8c4";
  ctx.fillText(sub, W/2, H*0.78);

  var tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

function makeNPCSign(x, z, sectionName, tagline) {
  var rot = Math.atan2(x, z);

}

  }
  for (var i = 0; i < 125; i++) {
    var x = -9.45 + Math.random()*18.9, z = -6.45 + Math.random()*12.9;
    if (Math.abs(x) < 0.65 && Math.abs(z-1.55) < 0.65) continue;
    if (onPath(x, z)) continue;
    var r = Math.random();
    if (r > 0.54) {
      var tuft = new THREE.Group(); tuft.position.set(x,0.44,z); scene.add(tuft);
      for (var j = 0; j < 4+Math.random()*4; j++) addTo(tuft, new THREE.CylinderGeometry(0.012,0.025,0.32+Math.random()*0.22,5), mat.grass, [0,0.16,0], [Math.random()*0.65,Math.random()*Math.PI,Math.random()*0.65], [1,1,1]);
    } else if (r > 0.3) {
      var flower = new THREE.Group(); flower.position.set(x,0.44,z); scene.add(flower);
      addTo(flower, new THREE.CylinderGeometry(0.012,0.016,0.26,5), mat.grassDark, [0,0.13,0],[0.12,0,0.05],[1,1,1]);
      addTo(flower, new THREE.SphereGeometry(0.06,8,6), Math.random()>0.5?mat.flowerRed:mat.flowerBlue, [0.02,0.3,0],[0,0,0],[1,0.75,1]);
    } else {
      addTo(scene, new THREE.DodecahedronGeometry(0.11+Math.random()*0.16,0), mat.stoneDark, [x,0.55,z],[Math.random(),Math.random(),Math.random()],[1.25,0.55,1]);
    }
  }
})();

/* ── water + clouds ── */
var water = mesh(new THREE.CircleGeometry(42,96), new THREE.MeshStandardMaterial({color:0x9fb6bf,roughness:0.5,metalness:0.05,transparent:true,opacity:0.42}), [0,-1.85,0],[-Math.PI/2,0,0],[1,1,1]);
water.receiveShadow = false;

for (var ci = 0; ci < 18; ci++) {
  var cloud = new THREE.Group();
  var ca = Math.random()*Math.PI*2, cr = 17+Math.random()*16;
  cloud.position.set(Math.cos(ca)*cr, -1.15-Math.random()*0.7, Math.sin(ca)*cr);
  scene.add(cloud);
  for (var cj = 0; cj < 4; cj++) {
    var cp = addTo(cloud, new THREE.SphereGeometry(0.7+Math.random()*1.1,12,8), new THREE.MeshBasicMaterial({color:0xdbe2e3,transparent:true,opacity:0.22}), [cj*0.75,Math.random()*0.25,Math.random()*0.5],[0,0,0],[1.8,0.28,1]);
    cp.castShadow = false; cp.receiveShadow = false;
  }
}

/* ── input ── */
var keys = new Set();
var orbit = Math.PI, pitch = 0.58, dragging = false, lastX = 0, lastY = 0;
var currentNPC = null, panelOpen = false;

window.addEventListener("keydown", function(e) {
  var k = e.key.toLowerCase(); keys.add(k);
  if (k === "e") { if (panelOpen) closePanel(); else if (currentNPC) openPanel(currentNPC.id); }
  if (k === "escape" && panelOpen) closePanel();
});
window.addEventListener("keyup", function(e) { keys.delete(e.key.toLowerCase()); });
window.addEventListener("pointerdown", function(e) { dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener("pointerup", function() { dragging=false; });
window.addEventListener("pointermove", function(e) {
  if (!dragging) return;
  orbit -= (e.clientX-lastX)*0.006;
  pitch = Math.max(0.18, Math.min(0.78, pitch+(e.clientY-lastY)*0.004));
  lastX=e.clientX; lastY=e.clientY;
});

/* ── panel ── */
var panelEl   = document.getElementById("panel");
var panelBody = document.getElementById("panel-body");
var backdrop  = document.getElementById("backdrop");
var hintEl    = document.getElementById("interact-hint");

function openPanel(id) {
  panelBody.innerHTML = panelContent[id] || "";
  panelEl.classList.add("open");
  backdrop.classList.add("active");
  panelOpen = true;
}
function closePanel() {
  panelEl.classList.remove("open");
  backdrop.classList.remove("active");
  panelOpen = false;
}
document.getElementById("panel-close").addEventListener("click", closePanel);
backdrop.addEventListener("click", closePanel);

// Swipe-to-close panel (mobile)
(function() {
  var startX = 0, startY = 0, dx = 0, locked = false;
  panelEl.addEventListener("touchstart", function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dx = 0; locked = false;
    panelEl.style.transition = "none";
  }, { passive: true });
  panelEl.addEventListener("touchmove", function(e) {
    if (locked) return;
    dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx)) { locked = true; panelEl.style.transition = ""; return; }
    if (dx > 0) panelEl.style.transform = "translateX(" + dx + "px)";
  }, { passive: true });
  panelEl.addEventListener("touchend", function() {
    panelEl.style.transition = "";
    if (dx > 80) { closePanel(); }
    else { panelEl.style.transform = panelOpen ? "" : "translateX(110%)"; }
    dx = 0;
  });
})();

/* ── player update ── */
function updatePlayer(dt, t) {
  var inputX = (keys.has("d")||keys.has("arrowright")?1:0) - (keys.has("a")||keys.has("arrowleft")?1:0);
  var inputZ = (keys.has("s")||keys.has("arrowdown")?1:0) - (keys.has("w")||keys.has("arrowup")?1:0);
  var moving = (inputX !== 0 || inputZ !== 0);
  var run = keys.has("shift");

  if (moving) {
    var len = Math.sqrt(inputX*inputX+inputZ*inputZ);
    inputX /= len; inputZ /= len;
    var ca = Math.cos(orbit), sa = Math.sin(orbit);
    var dx =  ca * inputX + sa * inputZ;
    var dz = -sa * inputX + ca * inputZ;
    var spd = run ? 5.2 : 3.55;
    player.position.x += dx * dt * spd;
    player.position.z += dz * dt * spd;
    player.userData.heading = Math.atan2(dx,dz) + Math.PI;
  }

  if ((keys.has(" ")||keys.has("spacebar")) && player.userData.grounded && !player.userData.jumpHeld) {
    player.userData.verticalVelocity = 4.5;
    player.userData.grounded = false; player.userData.jumpHeld = true;
  }
  if (!keys.has(" ") && !keys.has("spacebar")) player.userData.jumpHeld = false;

  player.userData.verticalVelocity -= 12.5 * dt;
  player.position.y += player.userData.verticalVelocity * dt;
  if (player.position.y <= 0.56) {
    player.position.y = 0.56; player.userData.verticalVelocity = 0; player.userData.grounded = true;
  }
  player.position.x = Math.max(-9.05, Math.min(9.05, player.position.x));
  player.position.z = Math.max(-6.25, Math.min(6.25, player.position.z));
  resolveCollisions();

  player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, player.userData.heading, 0.18);
  if (player.userData.grounded) {
    player.position.y = 0.56 + Math.sin(t*8) * (moving ? 0.018 : 0.005);
  }

  var swing = Math.sin(t*7.5) * (moving ? 0.5 : 0.05);
  player.userData.armL.rotation.x = -swing * 0.55;
  player.userData.armR.rotation.x =  swing * 0.55;

  var walk = t * 7.5;
  if (moving) {
    player.userData.footL.position.y = Math.max(0, Math.sin(walk))       * 0.11;
    player.userData.footR.position.y = Math.max(0, Math.sin(walk+Math.PI)) * 0.11;
  } else {
    player.userData.footL.position.y = THREE.MathUtils.lerp(player.userData.footL.position.y, 0, 0.12);
    player.userData.footR.position.y = THREE.MathUtils.lerp(player.userData.footR.position.y, 0, 0.12);
  }
}

/* ── camera zoom (scroll wheel) ── */
var camDist = 8.7;
var CAM_MIN = 3.5, CAM_MAX = 18;
window.addEventListener("wheel", function(e) {
  e.preventDefault();
  camDist = Math.max(CAM_MIN, Math.min(CAM_MAX, camDist + e.deltaY * 0.022));
}, { passive: false });

/* ── camera ── */
function updateCamera() {
  var tgt = player.position.clone().add(new THREE.Vector3(0, 0.72, 0));
  var dist = innerWidth < 800 ? Math.min(camDist * 1.12, CAM_MAX) : camDist;
  var y = 4.8 + pitch * 2.35;
  var cx = player.position.x + Math.sin(orbit) * dist;
  var cz = player.position.z + Math.cos(orbit) * dist;
  camera.position.lerp(new THREE.Vector3(cx, y, cz), 0.085);
  camera.lookAt(tgt);
}

/* ── UI update (NPC labels + house signs) ── */
var _v3 = new THREE.Vector3();

function updateUI(t) {
  var near = null, nearDist = Infinity;

  for (var i = 0; i < npcDefs.length; i++) {
    var npc = npcDefs[i];
    npc.group.position.y = npc.group.userData.baseY + Math.sin(t*1.1 + i*2.1) * 0.022;

    var dx = player.position.x - npc.group.position.x;
    var dz = player.position.z - npc.group.position.z;
    var dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < 2.4 && dist < nearDist) { nearDist = dist; near = npc; }

    _v3.set(npc.group.position.x, npc.group.userData.baseY + (npc.labelOffset||1.4), npc.group.position.z).project(camera);
    var sx = (_v3.x * 0.5 + 0.5) * innerWidth;
    var sy = (-_v3.y * 0.5 + 0.5) * innerHeight;
    npc.el.style.left = sx + "px";
    npc.el.style.top  = sy + "px";
    npc.el.style.opacity = _v3.z < 1 ? "1" : "0";

    if (npc.bubbleEl) {
      npc.bubbleEl.textContent = dist < 2.5 ? "[E] to talk" : npc.greeting;
    }
  }

  currentNPC = near;
  hintEl.classList.remove("visible"); // E key still works — no banner shown

  // house-door labels removed — section names live on the NPC sign posts only

  // sign text is now painted directly onto the 3D mesh via canvas texture — no HTML overlay needed
}


/* ── animate ── */
function animate() {
  var dt = Math.min(clock.getDelta(), 0.033);
  var t = clock.elapsedTime;

  updatePlayer(dt, t);

  for (var i = 0; i < houses.length; i++) {
    houses[i].position.y = houses[i].userData.baseY + Math.sin(t*0.45 + i*1.7) * 0.006;
    houses[i].rotation.z = Math.sin(t*0.35 + i) * 0.003;
  }
  for (var i = 0; i < trees.length; i++) {
    var sw = Math.sin(t*0.95 + i) * 0.035;
    trees[i].userData.crown.rotation.z = sw;
    trees[i].userData.sideA.rotation.z = sw * 1.3;
    trees[i].userData.sideB.rotation.z = sw * 1.1;
  }
  water.material.opacity = 0.36 + Math.sin(t*0.5) * 0.04;
  updateUI(t);
  updateCamera();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

window.addEventListener("resize", function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
});

camera.position.set(0, 5.1, -12);
updateCamera();

// Background music — starts on first interaction (browser autoplay policy)
var bgMusic = new Audio('./music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.38;
var musicStarted = false;

var musicBtn = document.getElementById("music-btn");

function startMusic() {
  if (!musicStarted) {
    musicStarted = true;
    bgMusic.play().catch(function(){});
  }
}
// Start on first touch/click/key anywhere
window.addEventListener("pointerdown", startMusic, { once: true });
window.addEventListener("keydown",     startMusic, { once: true });

musicBtn.addEventListener("click", function(e) {
  e.stopPropagation();
  startMusic();
  if (bgMusic.paused) {
    bgMusic.play().catch(function(){});
    musicBtn.innerHTML = "&#x1F50A;";
  } else {
    bgMusic.pause();
    musicBtn.innerHTML = "&#x1F507;";
  }
});

// Panda welcome hint — appears after 1.2 s, auto-hides after 5.5 s or on first interaction
(function() {
  var th = document.getElementById("tutorial-hint");
  function hideTH() { if (th) th.classList.remove("show"); }
  setTimeout(function() {
    if (!th) return;
    th.classList.add("show");
    var autoHide = setTimeout(hideTH, 10000);
    function dismiss() { clearTimeout(autoHide); hideTH(); }
    window.addEventListener("keydown",    dismiss, { once: true });
    window.addEventListener("pointerdown", dismiss, { once: true });
    window.addEventListener("wheel",       dismiss, { once: true });
  }, 1200);
})();

animate();
</script>
